# SwiftLint configuration for KeyMic
# https://github.com/realm/SwiftLint

# Paths to include/exclude
included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm

# Reporter format (xcode for IDE integration, json for CI)
reporter: "xcode"

# ── Line length ────────────────────────────────────────────────────────────────
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

# ── File length ────────────────────────────────────────────────────────────────
file_length:
  warning: 500
  error: 800

# ── Type body length ───────────────────────────────────────────────────────────
type_body_length:
  warning: 300
  error: 500

# ── Function body length ───────────────────────────────────────────────────────
function_body_length:
  warning: 60
  error: 100

# ── Function parameter count ───────────────────────────────────────────────────
function_parameter_count:
  warning: 6
  error: 8

# ── Cyclomatic complexity ──────────────────────────────────────────────────────
cyclomatic_complexity:
  warning: 15
  error: 25

# ── Nesting ────────────────────────────────────────────────────────────────────
nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

# ── Identifier name ────────────────────────────────────────────────────────────
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 70
  excluded:
    - id
    - x
    - y
    - dx
    - dy
    - kr
    - ok

# ── Type name ──────────────────────────────────────────────────────────────────
type_name:
  min_length:
    warning: 3
  max_length:
    warning: 50
    error: 70

# ── Enabled opt-in rules ───────────────────────────────────────────────────────
opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - xct_specific_matcher
  - yoda_condition

# ── Disabled default rules ─────────────────────────────────────────────────────
# These are disabled because they conflict with the project's existing patterns
# or are too noisy for a macOS system-level app using CoreGraphics/IOKit APIs.
disabled_rules:
  - todo                        # TODOs are tracked in issue.md, not enforced here
  - force_cast                  # AXUIElement/AXValue are CF types; as? doesn't bridge
  - force_try                   # Some AppKit/IOKit paths have no throwing alternative
  - trailing_whitespace         # Handled by swift-format

# ── Custom rules ───────────────────────────────────────────────────────────────
custom_rules:
  no_nslog:
    name: "Prefer os.Logger over NSLog"
    regex: "\\bNSLog\\b"
    message: "Use os.Logger instead of NSLog (see issue #12)."
    severity: warning

  no_print_in_sources:
    name: "No print() in Sources"
    regex: "\\bprint\\("
    included: "Sources/.*\\.swift"
    message: "Use os.Logger instead of print() in production code."
    severity: warning

  no_userdefaults_api_key:
    name: "No API keys in UserDefaults"
    regex: "UserDefaults.*apiKey|apiKey.*UserDefaults"
    message: "Store API keys in Keychain, not UserDefaults (see issue #7)."
    severity: error
